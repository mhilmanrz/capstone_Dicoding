services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: planner
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
 
 
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
 
 
  server:
    build: ./server
    ports:
      - '3002:3002'
    env_file: ./server/.env
    depends_on:
      - db
      - redis
 
 
  client:
    build: ./client
    ports:
      - '5174:5174'
    depends_on:
      - server
 
 
volumes:
  pgdata: